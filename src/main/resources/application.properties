spring.application.name=labair-api

# 1. to connect to the database
spring.datasource.url=jdbc:mysql://localhost:3306/labair_db?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

# 2. to automatically create the tables
spring.jpa.hibernate.ddl-auto=create-drop

# to always run SQL scripts
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# optional: to show the SQL queries
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# to make the properties in snake case in the JSON (Jackson) for the frontend
spring.jackson.property-naming-strategy=SNAKE_CASE